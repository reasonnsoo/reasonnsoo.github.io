<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>비밀의 방</title>
    <style>
        body {
            background-color: #8e44ad;
            color: white;
            text-align: center;
            font-family: 'Malgun Gothic', sans-serif;
            margin-top: 150px;
        }
        .secret-text {
            font-size: 32px;
            font-weight: bold;
            margin: 40px 0;
            color: #f1c40f;
        }
        .btn {
            display: inline-block;
            padding: 15px 30px;
            font-size: 18px;
            color: white;
            background-color: #34495e;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: background-color 0.3s;
            margin-top: 20px;
        }
        .btn:hover {
            background-color: #2c3e50;
        }
    </style>
</head>
<body>
    <h1>비밀의 방에 도착하셨습니다!</h1>
    
    <div class="secret-text">
        "당신은 방금 두 개의 웹페이지를 성공적으로 연결했습니다."
    </div>
    
    <p>웹사이트 개발의 가장 중요한 기초를 마스터하셨습니다.</p>
    
    <!-- index.html 파일로 돌아가는 링크 -->
    <a href="index.html" class="btn">메인 화면으로 돌아가기</a>
</body>
</html>
